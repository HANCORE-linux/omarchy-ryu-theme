# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.

general {
    col.active_border = rgba(525e5aee) rgba(525e5aee) rgba(8B9388ee) rgba(8B9388ee) rgba(da614eee) rgba(da614eee) 90deg
    col.inactive_border = rgb(050505)
    gaps_in = 4
    gaps_out = 5
    border_size = 2
}

group {
    col.border_active = $activeBorderColor
}

decoration {
    rounding = 3
    rounding_power = 3
      shadow {
      enabled = yes
      render_power = 4
      range = 16
      color = rgba(5, 5, 5, .7)
    }
}